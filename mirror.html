<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PC Rear View Mirror</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            overflow: hidden;
            background-color: #000;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://i.kym-cdn.com/entries/icons/original/000/035/687/cover5.jpg');
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover;
            opacity: 0.67;
            z-index: -2;
        }

        .mirror-container {
            position: relative;
            width: 60vw;
            height: 30vh;
            aspect-ratio: 2.1 / 1;
            margin-top: 5vh;
        }

        .mirror-arm {
            position: absolute;
            top: -5vh;
            left: 50%;
            transform: translateX(-50%);
            width: 3vw;
            height: 6vh;
            background: linear-gradient(to right, #1a1a1a, #333, #1a1a1a);
            clip-path: polygon(20% 0%, 80% 0%, 100% 100%, 0% 100%);
            z-index: -1;
        }

        .glass-area {
            position: absolute;
            top: 0%;
            bottom: 15%;
            left: 5%;
            right: 5%;
            overflow: hidden;
            background: #000;
            clip-path: polygon(3% 0%, 97% 0%, 100% 10%, 100% 90%, 97% 100%, 3% 100%, 0% 90%, 0% 10%);
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: fill;
            transform: scaleX(-1);
            filter: brightness(0.95) contrast(1.1) saturate(0.9);
        }

        .glare-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            background: radial-gradient(circle at 30% 30%, rgba(255, 255, 255, 0.1) 0%, transparent 70%);
        }

        .app-name-sidebar {
            position: fixed;
            left: 20px;
            top: 50%;
            transform: translateY(-50%);
            writing-mode: vertical-rl;
            text-orientation: mixed;

            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
            border: 1px solid pink;
            padding: 20px 10px;
            border-radius: 10px;

            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: red;
            font-size: 24px;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-weight: bold;
            pointer-events: none;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }
    </style>
</head>

<body>
    <div class="app-name-sidebar">REAR VIEW MIRROR for COMPUTER</div>
    <div class="mirror-container">
        <div class="mirror-arm"></div>
        <div class="glass-area">
            <video id="mirrorFeed" autoplay playsinline muted></video>
            <div class="glare-overlay"></div>
        </div>
    </div>

    <script>
        async function initMirror() {
            const video = document.getElementById('mirrorFeed');
            try {
                const stream = await navigator.mediaDevices.getUserMedia({
                    video: { width: 1280, height: 720 }
                });
                video.srcObject = stream;
            } catch (err) {
                alert("Camera access required for the mirror effect.");
            }
        }
        initMirror();
    </script>
</body>

</html>
