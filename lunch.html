<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AOB Schedule</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .status-card {
            background: #111;
            border: 1px solid #222;
            border-radius: 16px;
            padding: 2rem;
            margin-bottom: 1rem;
        }
        
        .current-state {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #666;
            margin-bottom: 0.5rem;
        }
        
        .main-display {
            font-size: 3rem;
            font-weight: 300;
            color: #fff;
            line-height: 1.2;
            margin-bottom: 0.5rem;
        }
        
        .main-display span.changed {
            color: #64ffda;
        }
        
        .sub-info {
            font-size: 1rem;
            color: #888;
            font-weight: 400;
        }
        
        .next-block {
            background: #161616;
            border: 1px solid #222;
            border-radius: 12px;
            padding: 1.25rem;
            margin-top: 1rem;
        }
        
        .next-label {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            color: #555;
            margin-bottom: 0.5rem;
        }
        
        .next-name {
            font-size: 1.125rem;
            color: #fff;
            font-weight: 500;
            margin-bottom: 0.25rem;
        }
        
        .next-time {
            font-size: 0.875rem;
            color: #666;
        }
        
        .explanation {
            margin-top: 1rem;
            padding: 1rem 1.25rem;
            background: #1a1a1a;
            border-radius: 8px;
            border-left: 2px solid #333;
        }
        
        .explanation.active {
            border-left-color: #64ffda;
        }
        
        .explanation-text {
            font-size: 0.8125rem;
            color: #777;
            line-height: 1.5;
        }
        
        .override {
            margin-top: 0.75rem;
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
        }
        
        .override button {
            background: transparent;
            border: 1px solid #333;
            color: #666;
            padding: 0.375rem 0.75rem;
            border-radius: 4px;
            font-size: 0.6875rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .override button:hover {
            border-color: #444;
            color: #888;
        }
        
        .override button.active {
            background: #64ffda;
            border-color: #64ffda;
            color: #0a0a0a;
        }
        
        .exception-badge {
            display: inline-block;
            background: #ff6b6b;
            color: #fff;
            font-size: 0.625rem;
            padding: 0.25rem 0.5rem;
            border-radius: 4px;
            margin-left: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .weekend-display {
            text-align: center;
            padding: 4rem 2rem;
        }
        
        .weekend-display .main-display {
            font-size: 4rem;
            font-weight: 200;
            letter-spacing: -0.02em;
        }
        
        .after-school {
            color: #444;
        }
        
        .progress-bar {
            height: 2px;
            background: #222;
            border-radius: 1px;
            margin-top: 1.5rem;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: #64ffda;
            transition: width 1s linear;
        }
        
        .schedule-list {
            margin-top: 1rem;
            border: 1px solid #222;
            border-radius: 8px;
            overflow: hidden;
        }
        
        .schedule-item {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #1a1a1a;
            font-size: 0.8125rem;
        }
        
        .schedule-item:last-child {
            border-bottom: none;
        }
        
        .schedule-item.current {
            background: #1a2a25;
            color: #64ffda;
        }
        
        .schedule-item.past {
            color: #444;
        }
        
        .schedule-item .block-name {
            font-weight: 500;
        }
        
        .schedule-item .block-time {
            color: #666;
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
        }
        
        .schedule-item.current .block-time {
            color: #64ffda;
        }
        
        .toggle-btn {
            background: transparent;
            border: none;
            color: #555;
            font-size: 0.75rem;
            cursor: pointer;
            padding: 0.5rem 0;
            margin-top: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: color 0.2s;
        }
        
        .toggle-btn:hover {
            color: #888;
        }
        
        .toggle-btn::after {
            content: '→';
            transition: transform 0.2s;
        }
        
        .toggle-btn.expanded::after {
            transform: rotate(90deg);
        }
    </style>
</head>
<body>
    <div class="container" id="app">
        <!-- Content injected by JS -->
    </div>

    <script>
        const dayNames = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
        let manualOverride = null;
        let showAllBlocks = false;
        let previous = { h: -1, m: -1, s: -1 };

        // Schedule data
        const regularSchedule = [
            { name: 'Block 1', start: '8:30', end: '9:57', type: 'class' },
            { name: 'Block 2', start: '10:00', end: '11:27', type: 'class' },
            { name: 'Mentor Minutes', start: '11:27', end: '11:39', type: 'optional', altName: 'Early Lunch' },
            { name: 'Lunch', start: '11:39', end: '12:09', type: 'lunch' },
            { name: 'Block 4', start: '12:11', end: '13:38', type: 'class' },
            { name: 'Block 5', start: '13:41', end: '15:08', type: 'class' }
        ];

        const thursdaySchedule = [
            { name: 'Block 1', start: '8:30', end: '9:23', type: 'class' },
            { name: 'Block 2', start: '9:25', end: '10:18', type: 'class' },
            { name: 'Block 3', start: '10:20', end: '11:13', type: 'class' },
            { name: 'Block 4', start: '11:15', end: '12:08', type: 'class' }
        ];

        // Half day schedule (approximate based on early dismissal)
        const halfDaySchedule = [
            { name: 'Block 1', start: '8:30', end: '9:16', type: 'class' },
            { name: 'Block 2', start: '9:20', end: '10:06', type: 'class' },
            { name: 'Block 3', start: '10:10', end: '10:56', type: 'class' },
            { name: 'Block 4', start: '11:00', end: '11:46', type: 'class' }
        ];

        const exceptions = {
            '2026-03-26': { type: 'long-thursday', name: 'Long Day Thursday' },
            '2026-03-27': { type: 'half-friday', name: 'Half Day Friday' },
            '2025-12-18': { type: 'long-thursday', name: 'Long Day Thursday' },
            '2025-12-19': { type: 'half-friday', name: 'Half Day Friday' },
        };

        const breaks = [
            { start: '2026-03-30', end: '2026-04-06', name: 'Spring Break' },
            { start: '2026-02-25', end: '2026-03-02', name: 'Winter Break' },
        ];

        function pad(n) {
            return n.toString().padStart(2, '0');
        }

        function formatDate(date) {
            return date.toISOString().split('T')[0];
        }

        function timeToMinutes(timeStr) {
            const [h, m] = timeStr.split(':').map(Number);
            return h * 60 + m;
        }

        function isBreak(date) {
            const dateStr = formatDate(date);
            for (const b of breaks) {
                if (dateStr >= b.start && dateStr <= b.end) return b.name;
            }
            return null;
        }

        function getException(date) {
            return exceptions[formatDate(date)] || null;
        }

        function getSchedule(date, override = null) {
            const day = date.getDay();
            const exc = getException(date);
            const effectiveType = override || (exc ? exc.type : null);

            if (day === 0 || day === 6) return { type: 'weekend', schedule: null };
            if (day === 4 && effectiveType !== 'long-thursday') return { type: 'thursday', schedule: thursdaySchedule };
            if (effectiveType === 'half-friday' && day === 5) return { type: 'half-day', schedule: halfDaySchedule };
            
            return { type: 'regular', schedule: regularSchedule };
        }

        function getCurrentBlock(schedule, currentMinutes) {
            if (!schedule) return null;
            
            for (let i = 0; i < schedule.length; i++) {
                const block = schedule[i];
                const start = timeToMinutes(block.start);
                const end = timeToMinutes(block.end);
                
                if (currentMinutes >= start && currentMinutes < end) {
                    return { ...block, index: i, progress: (currentMinutes - start) / (end - start) };
                }
                
                // Check if we're in gap between blocks
                if (i < schedule.length - 1) {
                    const nextStart = timeToMinutes(schedule[i + 1].start);
                    if (currentMinutes >= end && currentMinutes < nextStart) {
                        return { 
                            name: 'Passing', 
                            type: 'passing',
                            index: i,
                            nextBlock: schedule[i + 1],
                            nextStart: nextStart,
                            end: nextStart
                        };
                    }
                }
            }
            
            // Before school
            const firstStart = timeToMinutes(schedule[0].start);
            if (currentMinutes < firstStart) {
                return {
                    name: 'Before School',
                    type: 'before',
                    nextBlock: schedule[0],
                    nextStart: firstStart,
                    end: firstStart
                };
            }
            
            // After school
            const lastEnd = timeToMinutes(schedule[schedule.length - 1].end);
            if (currentMinutes >= lastEnd) {
                return {
                    name: 'School Over',
                    type: 'after',
                    end: lastEnd
                };
            }
            
            return null;
        }

        function getNextBlockInfo(schedule, currentIndex) {
            if (!schedule || currentIndex === undefined) return null;
            if (currentIndex + 1 < schedule.length) {
                return schedule[currentIndex + 1];
            }
            return null;
        }

        function formatDuration(ms) {
            const h = Math.floor(ms / 3.6e6);
            const m = Math.floor((ms % 3.6e6) / 6e4);
            const s = Math.floor((ms % 6e4) / 1e3);
            return { h, m, s };
        }

        function renderScheduleList(schedule, currentBlock) {
            if (!showAllBlocks || !schedule) return '';
            
            const now = new Date();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            const items = schedule.map((block, index) => {
                const start = timeToMinutes(block.start);
                const end = timeToMinutes(block.end);
                const isCurrent = currentMinutes >= start && currentMinutes < end;
                const isPast = currentMinutes >= end;
                
                return `
                    <div class="schedule-item ${isCurrent ? 'current' : ''} ${isPast ? 'past' : ''}">
                        <span class="block-name">${block.name}</span>
                        <span class="block-time">${block.start}-${block.end}</span>
                    </div>
                `;
            }).join('');
            
            return `<div class="schedule-list">${items}</div>`;
        }

        function update() {
            const now = new Date();
            const today = now.getDay();
            const currentMinutes = now.getHours() * 60 + now.getMinutes();
            
            const breakName = isBreak(now);
            
            // Handle break
            if (breakName) {
                renderBreak(breakName);
                return;
            }

            const { type, schedule } = getSchedule(now, manualOverride);
            const exc = getException(now);

            // Handle weekend
            if (type === 'weekend') {
                renderWeekend();
                return;
            }

            // Handle half day
            if (type === 'half-day') {
                const currentBlock = getCurrentBlock(schedule, currentMinutes);
                if (currentBlock?.type === 'after') {
                    renderAfterSchool('Half Day Complete', exc, schedule);
                } else {
                    renderBlockCountdown(currentBlock, schedule, type, exc);
                }
                return;
            }

            // Handle Thursday no lunch
            if (type === 'thursday') {
                const currentBlock = getCurrentBlock(schedule, currentMinutes);
                if (currentBlock?.type === 'after') {
                    renderAfterSchool('Thursday Early Dismissal', exc, schedule);
                } else {
                    renderBlockCountdown(currentBlock, schedule, type, exc);
                }
                return;
            }

            // Regular day with lunch
            const currentBlock = getCurrentBlock(schedule, currentMinutes);
            
            if (!currentBlock || currentBlock.type === 'after') {
                renderAfterSchool('School Day Complete', exc, schedule);
                return;
            }

            renderBlockCountdown(currentBlock, schedule, type, exc);
        }

        function renderBreak(name) {
            const app = document.getElementById('app');
            app.innerHTML = `
                <div class="status-card weekend-display">
                    <div class="current-state">No Classes</div>
                    <div class="main-display">${name}</div>
                    <div class="sub-info">Classes resume after break</div>
                </div>
            `;
        }

        function renderWeekend() {
            const app = document.getElementById('app');
            const nextMonday = new Date();
            nextMonday.setDate(nextMonday.getDate() + (1 + 7 - nextMonday.getDay()) % 7);
            
            app.innerHTML = `
                <div class="status-card weekend-display">
                    <div class="current-state">${dayNames[new Date().getDay()]}</div>
                    <div class="main-display">Weekend</div>
                    <div class="sub-info">Monday: Block 2 ends 11:27 AM</div>
                    <div class="next-block" style="margin-top: 2rem;">
                        <div class="next-label">Next Lunch</div>
                        <div class="next-name">Monday 11:27 AM</div>
                        <div class="next-time">Early option (skip mentor minutes)</div>
                    </div>
                </div>
            `;
        }

        function renderAfterSchool(title, exc, schedule = null) {
            const app = document.getElementById('app');
            const badge = exc ? `<span class="exception-badge">${exc.name}</span>` : '';
            
            // Find next school day with lunch
            let nextDate = new Date();
            nextDate.setDate(nextDate.getDate() + 1);
            let searchLimit = 10;
            
            while (searchLimit > 0) {
                const breakName = isBreak(nextDate);
                const { type: nextType, schedule: nextSchedule } = getSchedule(nextDate);
                
                if (!breakName && nextType !== 'weekend') {
                    // Check if it has lunch
                    const hasLunch = nextSchedule && nextSchedule.some(b => b.type === 'lunch' || b.type === 'optional');
                    if (hasLunch || nextType === 'half-day') break;
                }
                nextDate.setDate(nextDate.getDate() + 1);
                searchLimit--;
            }
            
            const { schedule: nextSchedule } = getSchedule(nextDate);
            const nextDayName = dayNames[nextDate.getDay()];
            const earlyLunch = nextSchedule?.find(b => b.type === 'optional');
            const regularLunch = nextSchedule?.find(b => b.type === 'lunch');
            
            let nextLunchText = '';
            if (earlyLunch) {
                nextLunchText = `${nextDayName} ${earlyLunch.start} (early) or ${regularLunch?.start || '11:39'}`;
            } else if (nextSchedule) {
                // Half day or other - just show dismissal
                const lastBlock = nextSchedule[nextSchedule.length - 1];
                nextLunchText = `${nextDayName} ends ${lastBlock.end}`;
            }
            
            const scheduleList = renderScheduleList(schedule, null);
            const toggleBtn = schedule ? `
                <button class="toggle-btn ${showAllBlocks ? 'expanded' : ''}" onclick="toggleSchedule()">
                    ${showAllBlocks ? 'Hide' : 'Show'} all blocks
                </button>
            ` : '';
            
            app.innerHTML = `
                <div class="status-card">
                    <div class="current-state">Status</div>
                    <div class="main-display after-school">${title}${badge}</div>
                    <div class="sub-info">See you tomorrow</div>
                    <div class="next-block">
                        <div class="next-label">Next</div>
                        <div class="next-name">${nextLunchText || 'School tomorrow'}</div>
                    </div>
                    ${scheduleList}
                    ${toggleBtn}
                </div>
            `;
        }

        function renderBlockCountdown(current, schedule, type, exc) {
            const app = document.getElementById('app');
            const now = new Date();
            
            let targetTime, displayText, subText, nextBlockInfo;
            let isLunchRelated = false;
            
            if (current.type === 'before') {
                targetTime = new Date(now);
                targetTime.setHours(Math.floor(current.nextStart / 60), current.nextStart % 60, 0);
                displayText = current.nextBlock.name;
                subText = `Starts ${current.nextBlock.start}`;
                nextBlockInfo = getNextBlockInfo(schedule, 0);
            } else if (current.type === 'passing') {
                targetTime = new Date(now);
                targetTime.setHours(Math.floor(current.nextStart / 60), current.nextStart % 60, 0);
                displayText = current.nextBlock.name;
                subText = `Starts ${current.nextBlock.start}`;
                nextBlockInfo = getNextBlockInfo(schedule, current.index + 1);
            } else if (current.type === 'optional') {
                const regularLunchStart = timeToMinutes('11:39');
                const currentMinutes = now.getHours() * 60 + now.getMinutes();
                
                if (currentMinutes < regularLunchStart) {
                    targetTime = new Date(now);
                    targetTime.setHours(11, 39, 0);
                    displayText = 'Lunch';
                    subText = 'Regular lunch starts 11:39';
                    isLunchRelated = true;
                } else {
                    targetTime = new Date(now);
                    targetTime.setHours(12, 9, 0);
                    displayText = 'Lunch Ends';
                    subText = 'Block 4 starts 12:11';
                    isLunchRelated = true;
                }
                nextBlockInfo = schedule.find(b => b.name === 'Block 4');
            } else if (current.type === 'lunch') {
                targetTime = new Date(now);
                targetTime.setHours(12, 9, 0);
                displayText = 'Lunch Ends';
                subText = 'Block 4 starts 12:11';
                isLunchRelated = true;
                nextBlockInfo = schedule.find(b => b.name === 'Block 4');
            } else {
                const endMinutes = timeToMinutes(current.end);
                targetTime = new Date(now);
                targetTime.setHours(Math.floor(endMinutes / 60), endMinutes % 60, 0);
                displayText = current.name;
                subText = `Ends ${current.end}`;
                nextBlockInfo = getNextBlockInfo(schedule, current.index);
            }
            
            const ms = targetTime - now;
            const { h, m, s } = formatDuration(ms);
            
            const timeChanged = previous.h !== h || previous.m !== m || previous.s !== s;
            previous = { h, m, s };
            
            const timeHtml = `
                <span class="${timeChanged && previous.h !== h ? 'changed' : ''}">${pad(h)}</span>:
                <span class="${timeChanged && previous.m !== m ? 'changed' : ''}">${pad(m)}</span>:
                <span class="${timeChanged && previous.s !== s ? 'changed' : ''}">${pad(s)}</span>
            `;
            
            const badge = exc ? `<span class="exception-badge">${exc.name}</span>` : '';
            const progressPercent = current.progress ? Math.round(current.progress * 100) : 0;
            
            let nextBlockHtml = '';
            if (nextBlockInfo) {
                nextBlockHtml = `
                    <div class="next-block">
                        <div class="next-label">Next</div>
                        <div class="next-name">${nextBlockInfo.name}</div>
                        <div class="next-time">${nextBlockInfo.start} - ${nextBlockInfo.end}</div>
                    </div>
                `;
            }
            
            let explanationHtml = '';
            if (current.type === 'optional') {
                explanationHtml = `
                    <div class="explanation active">
                        <div class="explanation-text">
                            Mentor Minutes (11:27-11:39) are optional. You can go to lunch at 11:27 
                            or wait for the official lunch period at 11:39.
                        </div>
                    </div>
                `;
            } else if (type === 'thursday') {
                explanationHtml = `
                    <div class="explanation">
                        <div class="explanation-text">
                            Thursday early dismissal schedule. No lunch period - dismissal at 12:08 PM.
                        </div>
                        ${renderOverrideButtons('thursday')}
                    </div>
                `;
            } else if (type === 'half-day') {
                explanationHtml = `
                    <div class="explanation">
                        <div class="explanation-text">
                            Half day schedule with early dismissal. No lunch period today.
                        </div>
                        ${renderOverrideButtons('half-day')}
                    </div>
                `;
            } else if (isLunchRelated) {
                explanationHtml = `
                    <div class="explanation ${current.type === 'lunch' ? 'active' : ''}">
                        <div class="explanation-text">
                            Regular schedule: Block 2 ends 11:27, optional Mentor Minutes 11:27-11:39, 
                            Lunch 11:39-12:09, Block 4 at 12:11.
                        </div>
                    </div>
                `;
            }
            
            const scheduleList = renderScheduleList(schedule, current);
            const toggleBtn = `
                <button class="toggle-btn ${showAllBlocks ? 'expanded' : ''}" onclick="toggleSchedule()">
                    ${showAllBlocks ? 'Hide' : 'Show'} all blocks
                </button>
            `;
            
            app.innerHTML = `
                <div class="status-card">
                    <div class="current-state">${isLunchRelated ? 'Current' : 'Current Block'}</div>
                    <div class="main-display">${timeHtml}</div>
                    <div class="sub-info">${displayText}${badge}</div>
                    ${current.progress ? `
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progressPercent}%"></div>
                        </div>
                    ` : ''}
                    ${nextBlockHtml}
                    ${explanationHtml}
                    ${scheduleList}
                    ${toggleBtn}
                </div>
            `;
        }

        function renderOverrideButtons(context) {
            let buttons = '';
            if (context === 'thursday') {
                buttons = `<button onclick="toggleOverride('long-thursday')" ${manualOverride === 'long-thursday' ? 'class="active"' : ''}>Long day today?</button>`;
            } else if (context === 'half-day') {
                buttons = `<button onclick="toggleOverride('regular')" ${manualOverride === 'regular' ? 'class="active"' : ''}>Regular day?</button>`;
            }
            return buttons ? `<div class="override">${buttons}</div>` : '';
        }

        window.toggleOverride = function(type) {
            manualOverride = manualOverride === type ? null : type;
            previous = { h: -1, m: -1, s: -1 };
            update();
        };

        window.toggleSchedule = function() {
            showAllBlocks = !showAllBlocks;
            update();
        };

        update();
        setInterval(update, 1000);
    </script>
</body>
</html>
